<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spotmap — 스케이트는 끊임없는 자기혐오</title>
  <meta name="description" content="스케이트는 끊임없는 자기혐오. 내 주변 스케이트보드 스팟을 찾아보세요.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23000'/><text y='.9em' font-size='72' font-family='Arial Black' x='50%' dominant-baseline='auto' text-anchor='middle' fill='white' dy='0.85em'>S</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <div id="brand">
          <h1>spotmap</h1>
          <p class="slogan">스케이트는 끊임없는 자기혐오</p>
        </div>
        <div id="search-wrap">
          <input id="search" type="text" placeholder="스팟 이름, 주소 검색">
        </div>
        <div id="controls">
          <div id="filters">
            <button class="filter-btn active" data-category="전체">전체</button>
            <button class="filter-btn" data-category="공공스케이트파크">공공</button>
            <button class="filter-btn" data-category="사설스케이트파크">사설</button>
            <button class="filter-btn" data-category="스팟">스팟</button>
            <button class="filter-btn" data-category="스케이트샵">샵</button>
            <button class="filter-btn" data-category="즐겨찾기" id="btn-favorites">♥</button>
          </div>
          <button id="btn-sort" data-active="false">↕ 가까운 순</button>
        </div>
        <div id="radius-row" class="hidden">
          <span class="radius-label">반경</span>
          <div id="radius-btns">
            <button class="radius-btn active" data-km="0">전체</button>
            <button class="radius-btn" data-km="1">1km</button>
            <button class="radius-btn" data-km="3">3km</button>
            <button class="radius-btn" data-km="5">5km</button>
            <button class="radius-btn" data-km="10">10km</button>
          </div>
        </div>
      </header>
      <div id="list-meta"><span id="list-count"></span></div>
      <ul id="spot-list"></ul>
    </aside>

    <div id="map-wrap">
      <div id="map"></div>
      <button id="btn-locate">내 위치</button>
    </div>
  </div>

  <div id="detail-panel" class="hidden">
    <button id="detail-close">✕</button>
    <div id="detail-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
