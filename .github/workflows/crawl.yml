name: Update spots data

on:
  schedule:
    - cron: '0 15 * * 0'  # 매주 월요일 00:00 KST (UTC 15:00 일요일)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python crawler/ksbf.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/spots.json
          git diff --staged --quiet || (git commit -m "data: auto-update spots from ksbf" && git push)
